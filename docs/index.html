<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-1:#0a0e1a;
  --bg-2:#111827;
  --bg-card:rgba(17,24,39,0.7);
  --border:rgba(99,102,241,0.15);
  --accent:#6366f1;
  --accent2:#22d3ee;
  --accent3:#f59e0b;
  --text:#e2e8f0;
  --text-dim:#94a3b8;
  --text-muted:#64748b;
  --green:#22c55e;
  --red:#ef4444;
  --radius:16px;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
  background:var(--bg-1);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  padding:24px;
}
body::before{
  content:'';
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(99,102,241,0.08),transparent 50%),
             radial-gradient(ellipse at 80% 20%,rgba(34,211,238,0.06),transparent 50%),
             radial-gradient(ellipse at 50% 80%,rgba(245,158,11,0.04),transparent 50%);
  pointer-events:none;z-index:0;
}
.container{max-width:1400px;margin:0 auto;position:relative;z-index:1}

/* Header */
.header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:28px;padding:20px 28px;
  background:var(--bg-card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.header h1{
  font-size:24px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.header-time{
  font-size:14px;color:var(--text-dim);font-variant-numeric:tabular-nums;
}

/* Grid */
.grid{
  display:grid;gap:20px;
  grid-template-columns:1fr 1fr 1fr;
}
.grid-2{display:grid;gap:20px;grid-template-columns:1fr 1fr;}
.grid-full{grid-column:1/-1;}

/* Cards */
.card{
  background:var(--bg-card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;box-shadow:var(--shadow);
  transition:transform 0.2s,border-color 0.2s;
}
.card:hover{transform:translateY(-2px);border-color:rgba(99,102,241,0.3);}
.card-title{
  font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;
  color:var(--text-muted);margin-bottom:16px;display:flex;align-items:center;gap:8px;
}
.card-title .icon{font-size:16px;}

/* Weather Cards */
.weather-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.weather-card{
  background:rgba(99,102,241,0.08);
  border-radius:12px;padding:16px;
  border:1px solid rgba(99,102,241,0.1);
}
.weather-city{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;}
.weather-main{display:flex;align-items:center;justify-content:space-between;}
.weather-temp{font-size:36px;font-weight:700;}
.weather-temp .unit{font-size:20px;color:var(--text-dim);}
.weather-condition{font-size:13px;color:var(--text-dim);}
.weather-details{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
.weather-detail{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:4px;}
.weather-forecast{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(99,102,241,0.1);}
.forecast-day{flex:1;text-align:center;font-size:11px;color:var(--text-dim);}
.forecast-day .day-name{font-weight:600;margin-bottom:4px;}
.forecast-day .day-temp{color:var(--text);font-weight:500;}

/* Market */
.market-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.market-card{
  background:rgba(34,211,238,0.06);
  border-radius:12px;padding:16px;
  border:1px solid rgba(34,211,238,0.1);
  text-align:center;
}
.market-symbol{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}
.market-price{font-size:28px;font-weight:700;margin:6px 0;}
.market-change{font-size:13px;font-weight:500;}
.market-change.up{color:var(--green);}
.market-change.down{color:var(--red);}

/* VPS Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
.stat-card{text-align:center;padding:12px;}
.stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}
.stat-value{font-size:28px;font-weight:700;margin:6px 0 8px;}
.stat-bar{
  height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;
  max-width:200px;margin:0 auto;
}
.stat-bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease;}
.stat-bar-fill.green{background:linear-gradient(90deg,var(--green),#16a34a);}
.stat-bar-fill.blue{background:linear-gradient(90deg,var(--accent),#818cf8);}
.stat-bar-fill.yellow{background:linear-gradient(90deg,var(--accent3),#d97706);}
.stat-bar-fill.red{background:linear-gradient(90deg,var(--red),#dc2626);}
.stat-sub{font-size:12px;color:var(--text-dim);}

.chart-container{height:120px;margin-top:8px;}
.hostname-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;background:rgba(99,102,241,0.06);
  border-radius:10px;margin-bottom:12px;
  font-size:13px;color:var(--text-dim);
}
.hostname-bar .hostname{font-weight:600;color:var(--text);}

/* Processes */
.process-list{list-style:none;}
.process-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);
  font-size:13px;
}
.process-item:last-child{border-bottom:none;}
.process-name{color:var(--text);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.process-cpu{color:var(--accent2);font-weight:500;min-width:60px;text-align:right;}
.process-mem{color:var(--text-dim);min-width:60px;text-align:right;}

/* News */
.news-list{list-style:none;}
.news-item{
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);
}
.news-item:last-child{border-bottom:none;}
.news-source{
  display:inline-block;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.5px;
  padding:2px 8px;border-radius:4px;margin-bottom:4px;
}
.news-source.Global{background:rgba(99,102,241,0.15);color:#818cf8;}
.news-source.Indonesia{background:rgba(34,211,238,0.12);color:#22d3ee;}
.news-title{
  font-size:14px;line-height:1.4;display:block;
  text-decoration:none;color:var(--text);transition:color 0.2s;
}
.news-title:hover{color:var(--accent2);}

/* Quote */
.quote-text{
  font-size:16px;line-height:1.6;font-style:italic;
  color:var(--text);text-align:center;
  padding:8px 0;
}
.quote-text::before{content:'\201C';font-size:24px;color:var(--accent3);margin-right:4px;}
.quote-text::after{content:'\201D';font-size:24px;color:var(--accent3);margin-left:4px;}
.quote-author{
  text-align:right;font-size:13px;color:var(--text-dim);
  margin-top:8px;font-style:normal;
}

/* Time */
.time-card{text-align:center;}
.time-clock{font-size:52px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:2px;}
.time-date{font-size:16px;color:var(--text-dim);margin-top:4px;}
.time-greeting{font-size:14px;margin-top:8px;color:var(--accent2);}

/* Refresh */
.refresh-bar{
  display:flex;justify-content:space-between;align-items:center;
  margin:20px 0 0;padding:12px 20px;
  font-size:12px;color:var(--text-muted);
}
.refresh-btn{
  background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);
  color:var(--accent2);padding:6px 16px;border-radius:8px;
  cursor:pointer;font-size:12px;
  transition:all 0.2s;
}
.refresh-btn:hover{background:rgba(99,102,241,0.2);border-color:rgba(99,102,241,0.4);}
.refresh-status{color:var(--text-dim);}

/* Loading */
.loading{text-align:center;padding:20px;color:var(--text-muted);font-size:14px;}
.loading .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Error state */
.error-state{
  color:var(--red);font-size:13px;padding:8px 0;
  display:flex;align-items:center;gap:6px;justify-content:center;
}

/* Responsive */
@media(max-width:1024px){.grid{grid-template-columns:1fr 1fr;}}
@media(max-width:768px){
  .grid,.grid-2{grid-template-columns:1fr;}
  .stats-grid{grid-template-columns:1fr;}
  .weather-grid,.market-grid{grid-template-columns:1fr;}
  body{padding:12px;}
  .time-clock{font-size:36px;}
  .header{padding:16px 20px;flex-direction:column;gap:8px;text-align:center;}
}

/* History chart */
.history-chart{height:60px;margin-top:6px;}

/* Pulse animation for live indicator */
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.live-dot{display:inline-block;width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s ease-in-out infinite;margin-right:6px;}
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <h1>📊 Personal Dashboard</h1>
    <div class="header-time"><span class="live-dot"></span><span id="headerTime">--:--:--</span></div>
  </header>

  <div class="grid">
    <!-- Time & Quote -->
    <div class="card time-card">
      <div class="card-title"><span class="icon">⏰</span> Waktu & Kutipan</div>
      <div class="time-clock" id="clock">--:--:--</div>
      <div class="time-date" id="date">--</div>
      <div class="time-greeting" id="greeting">--</div>
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
        <div class="quote-text" id="quoteText">Loading...</div>
        <div class="quote-author" id="quoteAuthor">-</div>
      </div>
    </div>

    <!-- Weather -->
    <div class="card">
      <div class="card-title"><span class="icon">🌤️</span> Cuaca</div>
      <div id="weatherContent"><div class="loading"><span class="spinner"></span>Memuat cuaca...</div></div>
    </div>

    <!-- Market -->
    <div class="card">
      <div class="card-title"><span class="icon">💰</span> Market</div>
      <div id="marketContent"><div class="loading"><span class="spinner"></span>Memuat harga...</div></div>
    </div>
  </div>

  <!-- VPS Stats -->
  <div class="grid" style="margin-top:20px;">
    <div class="card grid-full">
      <div class="card-title"><span class="icon">💻</span> VPS System Stats</div>
      <div id="vpsContent"><div class="loading"><span class="spinner"></span>Memuat VPS stats...</div></div>
    </div>
  </div>

  <div class="grid-2" style="margin-top:20px;">
    <!-- News -->
    <div class="card">
      <div class="card-title"><span class="icon">📰</span> Berita Terkini</div>
      <div id="newsContent"><div class="loading"><span class="spinner"></span>Memuat berita...</div></div>
    </div>

    <!-- Top Processes -->
    <div class="card">
      <div class="card-title"><span class="icon">⚡</span> Top Processes</div>
      <div id="processContent"><div class="loading"><span class="spinner"></span>Memuat proses...</div></div>
    </div>
  </div>

  <div class="refresh-bar">
    <div class="refresh-status"><span id="lastUpdate">Menunggu data...</span></div>
    <button class="refresh-btn" onclick="refreshAll()">⟳ Refresh</button>
  </div>
</div>

<script>
// === API Config ===
// Auto-detect: if served from our VPS, use relative path; otherwise absolute
const API_BASE = (window.location.hostname === '168.110.195.174' || window.location.port === '6767')
  ? '/api' : 'http://168.110.195.174:6767/api';

// === State ===
let chartInstances = {};

// === Clock ===
function updateClock(){
  const now=new Date();
  const opts={weekday:'long',year:'numeric',month:'long',day:'numeric'};
  document.getElementById('clock').textContent=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('date').textContent=now.toLocaleDateString('id-ID',opts);
  document.getElementById('headerTime').textContent=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const h=now.getHours();
  let g='Selamat malam 🌙';
  if(h<12)g='Selamat pagi ☀️';else if(h<16)g='Selamat siang ☀️';else if(h<19)g='Selamat sore 🌅';
  document.getElementById('greeting').textContent=g;
}

// === Fetch helpers ===
async function fetchJSON(path){
  const r=await fetch(path,{cache:'no-store'});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function formatTime(ts){
  if(!ts)return '-';
  try{
    const d=new Date(ts);
    return d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  }catch(e){return ts;}
}

function formatCurrency(n){
  if(n==null||n===0)return '$0';
  if(n>=1000)return '$'+n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
  return '$'+n.toFixed(2);
}

// === Weather ===
async function loadWeather(){
  const el=document.getElementById('weatherContent');
  const d=await fetchJSON(API_BASE + '/weather');
  if(!d||!d.locations||d.locations.length===0){el.innerHTML='<div class="error-state">⚠️ Data cuaca tidak tersedia</div>';return;}
  let html='<div class="weather-grid">';
  for(const loc of d.locations){
    if(loc.error){html+='<div class="weather-card"><div class="error-state">⚠️ '+loc.name+': '+loc.error+'</div></div>';continue;}
    const code=parseInt(loc.condition_code)||113;
    const emoji=weatherEmoji(code);
    html+=`
      <div class="weather-card">
        <div class="weather-city">${emoji} ${loc.name}</div>
        <div class="weather-main">
          <div><div class="weather-temp">${loc.temp_c}<span class="unit">°C</span></div>
          <div class="weather-condition">${loc.condition}</div></div>
        </div>
        <div class="weather-details">
          <span class="weather-detail">💧 ${loc.humidity}%</span>
          <span class="weather-detail">🌬️ ${loc.wind_speed_kmh}km/h</span>
          <span class="weather-detail">👁️ ${loc.visibility_km}km</span>
        </div>
        ${loc.forecast?`<div class="weather-forecast">${loc.forecast.map(f=>{
          const day=new Date(f.date).toLocaleDateString('id-ID',{weekday:'short'});
          return `<div class="forecast-day"><div class="day-name">${day}</div><div class="day-temp">${f.min_temp}°/${f.max_temp}°</div></div>`;
        }).join('')}</div>`:''}
      </div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

function weatherEmoji(code){
  if(code<=113)return '☀️'; // Sunny
  if(code<=116)return '⛅'; // Partly cloudy
  if(code<=119)return '☁️'; // Cloudy
  if(code<=122)return '☁️'; // Overcast
  if(code<=143)return '🌫️'; // Mist
  if(code<=179)return '🌧️'; // Rain
  if(code<=182)return '🌧️'; // Heavy rain
  if(code<=200)return '⛈️'; // Thunder
  if(code<=227)return '🌨️'; // Snow
  if(code<=230)return '🌨️'; // Blizzard
  if(code<=248)return '🌫️'; // Fog
  if(code<=260)return '🌫️'; // Freezing fog
  if(code<=266)return '🌦️'; // Light drizzle
  if(code<=293)return '🌦️'; // Patchy rain
  if(code<=302)return '🌧️'; // Moderate rain
  if(code<=314)return '🌧️'; // Heavy rain
  if(code<=317)return '🌧️'; // Light freezing rain
  if(code<=320)return '🌧️'; // Heavy freezing rain
  if(code<=323)return '❄️'; // Light snow
  if(code<=329)return '❄️'; // Patchy snow
  if(code<=335)return '❄️'; // Moderate snow
  if(code<=338)return '❄️'; // Heavy snow
  if(code<=350)return '🧊'; // Ice pellets
  if(code<=356)return '🌧️'; // Light rain shower
  if(code<=359)return '🌧️'; // Moderate rain shower
  if(code<=362)return '🌧️'; // Light sleet showers
  if(code<=365)return '🌧️'; // Moderate sleet showers
  if(code<=368)return '❄️'; // Light snow showers
  if(code<=371)return '❄️'; // Heavy snow showers
  if(code<=374)return '🌧️'; // Light sleet
  if(code<=377)return '🌧️'; // Moderate sleet
  if(code<=386)return '⛈️'; // Thunder showers
  if(code<=392)return '⛈️'; // Mixed thunder
  if(code<=395)return '⛈️'; // Thunder with snow
  return '🌡️';
}

// === Market ===
async function loadMarket(){
  const el=document.getElementById('marketContent');
  const d=await fetchJSON(API_BASE + '/crypto');
  if(!d||!d.assets){el.innerHTML='<div class="error-state">⚠️ Data pasar tidak tersedia</div>';return;}
  const symbols={'BTC':'₿','XAU':'🥇'};
  let html='<div class="market-grid">';
  for(const a of d.assets){
    if(a.error){html+=`<div class="market-card"><div class="market-symbol">${a.symbol||'?'}</div><div class="error-state">⚠️ ${a.error}</div></div>`;continue;}
    const change=a.change_24h!=null;
    const up=change&&a.change_24h>=0;
    html+=`
      <div class="market-card">
        <div class="market-symbol">${symbols[a.symbol]||''} ${a.name}</div>
        <div class="market-price">${formatCurrency(a.price)}</div>
        ${change?`<div class="market-change ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(a.change_24h).toFixed(2)}% (24h)</div>`
                :'<div class="market-change" style="color:var(--text-muted)">-</div>'}
      </div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

// === VPS Stats ===
async function loadVPS(){
  const el=document.getElementById('vpsContent');
  const d=await fetchJSON(API_BASE + '/vps-stats');
  if(!d||d.error){el.innerHTML='<div class="error-state">⚠️ Data VPS tidak tersedia</div>';return;}
  const cpu=d.cpu,mem=d.memory,disk=d.disk,up=d.uptime;
  const cpuP=parseFloat(cpu.percent)||0;
  const memP=parseFloat(mem.percent)||0;
  const diskPP=parseInt(disk.percent)||0;
  const load=cpu.load_avg||[0,0,0];

  const cpuBar=cpuP>80?'red':cpuP>50?'yellow':'green';
  const memBar=memP>80?'red':memP>60?'yellow':'blue';
  const diskBar=diskPP>85?'red':diskPP>70?'yellow':'blue';

  let html=`
    <div class="hostname-bar">
      <span><span class="hostname">${d.hostname||'unknown'}</span> — Uptime: ${up.days||0}d ${up.hours||0}h ${up.minutes||0}m</span>
      <span>⚙️ ${cpu.cores||'?'} cores &nbsp;|&nbsp; Load: ${load.map(l=>l.toFixed(2)).join(' / ')}</span>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">CPU Usage</div>
        <div class="stat-value" style="color:${cpuP>80?'var(--red)':cpuP>50?'var(--accent3)':'var(--green)'}">${cpuP.toFixed(1)}%</div>
        <div class="stat-bar"><div class="stat-bar-fill ${cpuBar}" style="width:${Math.min(cpuP,100)}%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">RAM Usage</div>
        <div class="stat-value" style="color:${memP>80?'var(--red)':memP>60?'var(--accent3)':'var(--accent)'}">${memP.toFixed(1)}%</div>
        <div class="stat-bar"><div class="stat-bar-fill ${memBar}" style="width:${Math.min(memP,100)}%"></div></div>
        <div class="stat-sub">${mem.used}G / ${mem.total}G used</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Disk Usage</div>
        <div class="stat-value">${disk.percent||'N/A'}</div>
        <div class="stat-bar"><div class="stat-bar-fill ${diskBar}" style="width:${Math.min(diskPP,100)}%"></div></div>
        <div class="stat-sub">${disk.used||'?'} / ${disk.total||'?'} used</div>
      </div>
    </div>`;

  el.innerHTML=html;
}

// === Processes ===
async function loadProcesses(){
  const el=document.getElementById('processContent');
  const d=await fetchJSON(API_BASE + '/vps-stats');
  if(!d||!d.top_processes||d.top_processes.length===0){
    el.innerHTML='<div class="loading">Tidak ada data proses</div>';return;
  }
  let html='<ul class="process-list">';
  for(const p of d.top_processes){
    html+=`
      <li class="process-item">
        <span class="process-name" title="${p.command}">${p.command}</span>
        <span><span class="process-cpu">${p.cpu}%</span> <span class="process-mem">${p.mem}%</span></span>
      </li>`;
  }
  html+='</ul>';
  el.innerHTML=html;
}

// === News ===
async function loadNews(){
  const el=document.getElementById('newsContent');
  const d=await fetchJSON(API_BASE + '/news');
  if(!d||!d.articles||d.articles.length===0){
    el.innerHTML='<div class="error-state">⚠️ Berita tidak tersedia</div>';return;
  }
  let html='<ul class="news-list">';
  for(const a of d.articles){
    html+=`
      <li class="news-item">
        <span class="news-source ${a.category}">${a.source}</span>
        <a class="news-title" href="${a.link}" target="_blank" rel="noopener">${a.title}</a>
      </li>`;
  }
  html+='</ul>';
  el.innerHTML=html;
}

// === Quote ===
async function loadQuote(){
  const d=await fetchJSON(API_BASE + '/quote');
  if(d&&d.quote&&d.quote.content){
    document.getElementById('quoteText').textContent=d.quote.content;
    document.getElementById('quoteAuthor').textContent='— '+d.quote.author;
  }
}

// === All ===
async function refreshAll(){
  document.querySelectorAll('.refresh-status').forEach(e=>e.innerHTML='Memperbarui... <span class="spinner"></span>');
  try{await Promise.all([loadWeather(),loadMarket(),loadVPS(),loadProcesses(),loadNews(),loadQuote()]);}catch(e){}
  const now=new Date();
  document.getElementById('lastUpdate').textContent='Terakhir diperbarui: '+now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// === Init ===
updateClock();
setInterval(updateClock,1000);
refreshAll();
setInterval(refreshAll,300000); // 5 min
</script>
